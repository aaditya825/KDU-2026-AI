name: Coverage

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fastapi_app_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fastapi_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      SECRET_KEY: this-is-a-strong-test-secret-key-with-32-plus-chars
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fastapi_app_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fastapi_app_test
      BACKEND_CORS_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
