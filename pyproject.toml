[project]
name = "multimodal-assistant"
version = "0.1.0"
description = "Hybrid Service Layer + LCEL Skeleton assistant"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "httpx>=0.28.0",
  "langchain>=0.3.0",
  "langchain-core>=0.3.0",
  "langchain-google-genai>=2.1.0",
  "pydantic-settings>=2.6.0",
  "streamlit>=1.44.0",
  "uvicorn>=0.34.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = [
  "src",
]
testpaths = [
  "tests",
]
