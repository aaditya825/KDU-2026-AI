[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "fastapi-production-template"
version = "0.1.0"
description = "Reusable production-ready FastAPI starter template"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "alembic>=1.16.0,<2.0.0",
  "asyncpg>=0.30.0,<1.0.0",
  "fastapi>=0.128.5,<1.0.0",
  "pydantic-settings>=2.10.0,<3.0.0",
  "pwdlib[argon2]>=0.2.0,<1.0.0",
  "pyjwt>=2.10.0,<3.0.0",
  "python-json-logger>=3.3.0,<4.0.0",
  "python-multipart>=0.0.20,<1.0.0",
  "slowapi>=0.1.9,<1.0.0",
  "sqlalchemy>=2.0.40,<3.0.0",
  "starlette>=0.49.1,<1.0.0",
  "structlog>=25.4.0,<26.0.0",
  "uvicorn[standard]>=0.35.0,<1.0.0",
  "email-validator>=2.2.0,<3.0.0",
]

[project.optional-dependencies]
dev = [
  "aiosqlite>=0.21.0,<1.0.0",
  "bandit[toml]>=1.8.3,<2.0.0",
  "httpx>=0.28.1,<1.0.0",
  "mypy>=1.15.0,<2.0.0",
  "pip-audit>=2.9.0,<3.0.0",
  "pre-commit>=4.2.0,<5.0.0",
  "Pygments>=2.20.0,<3.0.0",
  "pytest>=8.3.5,<9.0.0",
  "pytest-asyncio>=0.26.0,<1.0.0",
  "pytest-cov>=6.1.1,<7.0.0",
  "requests>=2.33.0,<3.0.0",
  "ruff>=0.11.8,<1.0.0",
  "streamlit>=1.45.0,<2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
addopts = "-ra"
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["app"]

[tool.coverage.report]
skip_empty = true
show_missing = true
fail_under = 70

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "N",
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.13"
strict = true
warn_unused_configs = true
disallow_any_generics = true
plugins = []

[tool.bandit]
targets = ["app"]
exclude_dirs = ["tests", ".venv"]
